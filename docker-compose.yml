services:
  # ---------------------------------------------------------------------------
  # MinIO - S3 Compatible Object Storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: hms-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - hms-network

  # ---------------------------------------------------------------------------
  # Redis - Caching, Sessions, Pub/Sub, Job Queues
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: hms-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hms-network

  # ---------------------------------------------------------------------------
  # OCR / AI Microservice (Python)
  # ---------------------------------------------------------------------------
  ocr-service:
    build:
      context: ./services/ocr-service
      dockerfile: Dockerfile
    container_name: hms-ocr
    ports:
      - '5000:5000'
    environment:
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=hms-documents
    volumes:
      - ocr_models:/app/models
    depends_on:
      - redis
      - minio
    networks:
      - hms-network

  # ---------------------------------------------------------------------------
  # NestJS API Backend
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: hms-api
    ports:
      - '4000:4000'
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST}
      - REDIS_HOST=redis
      - S3_ENDPOINT=minio
      - OCR_SERVICE_URL=http://ocr-service:5000
    depends_on:
      - redis
      - minio
      - ocr-service
    networks:
      - hms-network

  # ---------------------------------------------------------------------------
  # Next.js Frontend
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: hms-web
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_WS_URL=ws://localhost:4000
    depends_on:
      - api
    networks:
      - hms-network

volumes:
  minio_data:
  redis_data:
  ocr_models:

networks:
  hms-network:
    driver: bridge
