# Nginx reverse proxy for HMS on AWS EC2 (native / no Docker for app services)
# Install: sudo cp deploy/ec2-native/nginx-hms.conf /etc/nginx/sites-available/hms
#          sudo ln -s /etc/nginx/sites-available/hms /etc/nginx/sites-enabled/
#          sudo certbot --nginx -d your-domain.gov.in

upstream hms_web {
    server 127.0.0.1:3000;
}

upstream hms_api {
    server 127.0.0.1:4000;
}

server {
    listen 80;
    server_name your-domain.gov.in;

    client_max_body_size 50M;

    location / {
        proxy_pass http://hms_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://hms_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://hms_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /ws/ {
        proxy_pass http://hms_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
