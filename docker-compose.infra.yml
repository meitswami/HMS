# Optional infrastructure only (MinIO + Redis) — use when running API/Web/OCR natively.
# Usage: docker compose -f docker-compose.infra.yml up -d

services:
  minio:
    image: minio/minio:latest
    container_name: hms-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hms-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  minio_data:
  redis_data:
